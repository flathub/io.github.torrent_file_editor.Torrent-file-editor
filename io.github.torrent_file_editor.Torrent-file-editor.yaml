app-id: io.github.torrent_file_editor.Torrent-file-editor
runtime: org.kde.Platform
runtime-version: "6.10"
sdk: org.kde.Sdk
command: torrent-file-editor
finish-args:
  # Need to open files from command line
  - --filesystem=home:rw
  # X11
  - --share=ipc
  - --socket=fallback-x11
  # Wayland
  - --socket=wayland
  - --device=dri
modules:
  - name: torrent-file-editor
    buildsystem: cmake-ninja
    sources:
      - type: archive
        url: https://github.com/torrent-file-editor/torrent-file-editor/releases/download/v1.0.2/torrent-file-editor-1.0.2.tar.gz
        sha256: adbc8eda5105c8dd6a2b231165c5446fc062b566272b40493a4dcd0bfc511e5b
        x-checker-data:
          type: json
          url: https://api.github.com/repos/torrent-file-editor/torrent-file-editor/releases/latest
          version-query: .tag_name | sub("^v"; "")
          timestamp-query: .published_at
          url-query: .assets[] | select(.name=="torrent-file-editor-" + $version + ".tar.gz") | .browser_download_url
      - type: patch
        path: patches/0001-Fix-main-branding-color-to-satisfy-Flathub.patch
